<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Locked — Equity Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
  <header class="topbar">
    <span class="topbar__brand">Equity <span>Tracker</span></span>
  </header>
  <main class="main">
    <div class="locked-page">
      <h1>Database Locked</h1>
      <p>
        The database is not open.  Use the API to unlock it, or start the
        server with <code>EQUITY_DB_PATH</code> and <code>EQUITY_DB_PASSWORD</code>
        set so it auto-opens on startup.
      </p>
      <p class="muted">
        API endpoint: <code>POST /admin/unlock</code>
      </p>
      <a href="/" class="btn btn-secondary">Retry</a>
    </div>
  </main>
</div>
</body>
</html>
