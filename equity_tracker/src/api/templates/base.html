<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Equity Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ 'values-hidden' if hide_values else '' }}">
<div class="layout">

  <header class="topbar">
    <span class="topbar__brand">EQUITY <span class="topbar__brand-accent">TRACKER</span></span>
    <span class="topbar__divider"></span>
    <nav class="topbar__nav">
      <a href="/"              class="{{ 'active' if request.url.path == '/' }}">Portfolio</a>
      <a href="/per-scheme"    class="{{ 'active' if request.url.path == '/per-scheme' }}">Per Scheme</a>
      <a href="/analytics"     class="{{ 'active' if request.url.path == '/analytics' }}">Analytics</a>
      <a href="/risk"          class="{{ 'active' if request.url.path == '/risk' }}">Risk</a>
      <a href="/calendar"      class="{{ 'active' if request.url.path == '/calendar' }}">Calendar</a>
      <a href="/tax-plan"      class="{{ 'active' if request.url.path == '/tax-plan' }}">Tax Plan</a>
      <a href="/dividends"     class="{{ 'active' if request.url.path == '/dividends' }}">Dividends</a>
      <a href="/simulate"      class="{{ 'active' if request.url.path == '/simulate' }}">Simulate</a>
      <a href="/cgt"           class="{{ 'active' if request.url.path == '/cgt' }}">CGT</a>
      <a href="/economic-gain" class="{{ 'active' if request.url.path == '/economic-gain' }}">Economic Gain</a>
      <a href="/net-value"     class="{{ 'active' if request.url.path == '/net-value' }}">Net Value</a>
      <a href="/audit"         class="{{ 'active' if request.url.path == '/audit' }}">Audit</a>
      <a href="/settings"      class="{{ 'active' if request.url.path == '/settings' }}">Settings</a>
    </nav>
    {% if hide_values %}
    <span class="topbar__privacy">Values Hidden</span>
    {% endif %}
  </header>

  <main class="main">

    {% if flash %}
    <div class="alert alert-success">{{ flash }}</div>
    {% endif %}

    {% block content %}{% endblock %}

  </main>

</div>
{% block extra_scripts %}{% endblock %}
</body>
</html>
