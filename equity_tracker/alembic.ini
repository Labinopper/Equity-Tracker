# alembic.ini — Alembic migration configuration for equity-tracker.
#
# The sqlalchemy.url below is a placeholder. The actual engine is built
# in alembic/env.py using DatabaseEngine, so the URL here is unused at
# runtime. It exists to satisfy Alembic's config parser.
#
# To run migrations:
#   1. Set environment variables:
#        EQUITY_TRACKER_DB_PATH=/path/to/portfolio.db
#        EQUITY_TRACKER_DB_PASSWORD=your-password
#   2. Run: alembic upgrade head
#
# For development / CI against a plain SQLite file, set:
#        EQUITY_TRACKER_DB_PATH=/path/to/dev.db
#        EQUITY_TRACKER_NO_ENCRYPT=1

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations = %(here)s/alembic/versions
version_path_separator = os

# Placeholder — overridden in env.py
sqlalchemy.url = sqlite:///placeholder.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
